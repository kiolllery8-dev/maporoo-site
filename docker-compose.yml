services:
  breznu:
    container_name: breznu
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - auslife-web
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  auslife-web:
    external: true
